<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Account | The Bank</title>
</head>

<body>
    <div class="account-layout">
        <div class="container">
            <div id="balance-display">
                <p>Current Balance</p>
                <h1>£<span id="balance">0</span></h1>
            </div>
            <p id="message"></p>
            <p id="account-owner"></p>
            <label for="amount">Amount:</label>
            <input type="number" id="amount">

            <div id="button-container">
                <button type="button" id="deposit-btn">Deposit</button>
                <button type="button" id="withdraw-btn">Withdraw</button>
                <button type="button" id="check-balance-btn">Check Balance</button>
            </div>
    </div>
    <div class="history-panel">
            <div id="transaction-history">
                <h2>Transaction History</h2>
                <ul id="history-list"></ul>
            </div>

        </div>
        
</div>
    <script src="index.js" type="module"></script>
</body>

</html>
